[theme]
base = "dark"
primaryColor = "#2EC4B6"
backgroundColor = "#0B1020"
secondaryBackgroundColor = "#121A2B"
textColor = "#F3F6FC"
linkColor = "#5B8DEF"
codeBackgroundColor = "#182235"
font = "sans serif"
baseRadius = "0.75rem"
buttonRadius = "0.7rem"
borderColor = "#24324A"
showWidgetBorder = true
showSidebarBorder = true
baseFontSize = 16

[server]
headless = true
runOnSave = true
